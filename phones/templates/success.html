{% extends 'base.html' %}

{% block content %}
<div class="text-center py-5">
    <div class="container">
        <i class="fas fa-check-circle fa-5x text-success mb-4 animate__animated animate__bounceIn"></i>
        <h2 class="fw-bold">Rahmat{% if order %}, {{ order.customer_name }}{% endif %}!</h2>
        <p class="lead text-muted">Buyurtmangiz muvaffaqiyatli qabul qilindi.</p>
        {% if order %}
            <p class="fw-bold">Buyurtma raqami: #{{ order.id }}</p>
        {% endif %}
        <a href="{% url 'home' %}" class="btn btn-primary rounded-pill px-5 py-2 shadow-sm mt-3">
            Bosh sahifaga qaytish
        </a>
    </div>
</div>

<script>
    // 1. Savatni darhol tozalash
    localStorage.removeItem('cart');
    
    // 2. Navbar-dagi raqamni 0 ga tushirish
    const badge = document.getElementById('cart-count');
    if (badge) {
        badge.innerText = '0';
    }

    // 3. Agar funksiya mavjud bo'lsa, uni chaqirish
    if(typeof updateCartBadge === 'function') {
        updateCartBadge();
    }
</script>
{% endblock %}
