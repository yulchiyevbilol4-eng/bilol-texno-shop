<!DOCTYPE html>
<html lang="uz">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Bilol's Texno Shop - Savat</title>

    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.2/css/all.min.css">

    <style>
        body { background: #f5f7fb; font-family: 'Segoe UI', Arial, sans-serif; }
        .demo-card { max-width: 320px; margin: 60px auto; background: #fff; border-radius: 22px; box-shadow: 0 10px 30px rgba(0,0,0,0.08); padding: 20px; text-align: center; }
        .demo-card img { width: 140px; height: 180px; object-fit: contain; margin-bottom: 15px; }
        .price { color: #0d6efd; font-weight: 700; font-size: 22px; margin-bottom: 15px; }
        .modal-content { border-radius: 25px; border: 0; box-shadow: 0 15px 40px rgba(0,0,0,0.15); }
        .section-label { font-size: 13px; color: #666; font-weight: 700; margin-bottom: 8px; text-align: left; display: block; }
        .form-control { border-radius: 12px !important; padding: 12px; border: 0; background: #f3f4f6; margin-bottom: 10px; }
        .confirm-btn { background: linear-gradient(90deg, #0d6efd, #0b5ed7); border: 0; border-radius: 16px; padding: 15px; font-weight: 700; color: white; width: 100%; transition: 0.3s; }
        .confirm-btn:hover { opacity: 0.9; transform: translateY(-2px); }
        
        #card_details { background: #f0f7ff; border: 1px solid #cfe2ff; border-radius: 16px; transition: 0.3s; }
        .copy-btn { border: 0; background: #fff; color: #0d6efd; border-radius: 8px; padding: 5px 10px; font-size: 12px; cursor: pointer; border: 1px solid #dee2e6; }
    </style>
</head>
<body>

<div class="container">
    <div class="demo-card">
        <img src="https://images.samsung.com/is/image/samsung/p6pim/uz_ru/2502/gallery/uz-ru-galaxy-a56-5g-sm-a566-535702-sm-a566blbdskz-544265239?$684_547_PNG$" alt="Samsung Galaxy A56">
        <h3>Samsung Galaxy A56</h3>
        <div class="price">4 800 000 so'm</div>
        <button class="btn btn-primary w-100 py-3 fw-bold" data-bs-toggle="modal" data-bs-target="#cartModal" onclick="addToCart(1, 'Samsung Galaxy A56', 4800000)">
            Savatga qo'shish
        </button>
    </div>
</div>

<div class="modal fade" id="cartModal" tabindex="-1" aria-hidden="true">
    <div class="modal-dialog modal-dialog-centered">
        <div class="modal-content">
            <div class="modal-header border-0 px-4 pt-4">
                <h4 class="fw-bold m-0"><i class="fas fa-shopping-basket me-2 text-primary"></i>Savat</h4>
                <button type="button" class="btn-close" data-bs-dismiss="modal"></button>
            </div>

            <div class="modal-body px-4 pb-4 text-center">
                <div id="cart-items-list" class="mb-3 text-start"></div>

                <div class="d-flex justify-content-between align-items-center fw-bold fs-4 mt-3 border-top pt-3">
                    <span>Jami:</span>
                    <span id="cart-total-price" class="text-primary">0 so'm</span>
                </div>

                <form id="order-form" method="POST" action="{% url 'create_order' %}" class="mt-3">
                    {% csrf_token %}
                    <input type="hidden" name="items" id="hidden-items">
                    <input type="hidden" name="total_price" id="hidden-total">

                    <div class="mb-3">
                        <span class="section-label">To'lov usuli:</span>
                        <div class="d-flex gap-2">
                            <input type="radio" class="btn-check" name="payment_type" id="pay_cash" value="cash" checked onchange="togglePayment()">
                            <label class="btn btn-outline-primary w-50 py-2 fw-bold" for="pay_cash">Naqd</label>

                            <input type="radio" class="btn-check" name="payment_type" id="pay_card" value="card" onchange="togglePayment()">
                            <label class="btn btn-outline-primary w-50 py-2 fw-bold" for="pay_card">Plastik karta</label>
                        </div>
                    </div>

                    <div id="card_details" style="display:none;" class="mb-3 p-3 text-start">
                        <div class="small fw-bold text-dark mb-1">To'lov uchun karta:</div>
                        <div class="bg-white p-2 rounded border d-flex justify-content-between align-items-center mb-2">
                            <code class="fw-bold text-primary fs-6" id="card_num">9860 3501 4364 0794</code>
                            <button type="button" class="copy-btn" onclick="copyCard()">Nusxa</button>
                        </div>
                        <div class="small text-muted">Ega: <b>BILOL YULCHIEV</b></div>
                        <div class="small text-danger mt-1" style="font-size: 11px;">* To'lovdan so'ng chekni @yulchiyevv777 ga yuboring.</div>
                    </div>

                    <input type="text" name="name" class="form-control" placeholder="Ismingiz" required>
                    <input type="text" name="phone" class="form-control" value="+998" required>
                    <textarea name="address" class="form-control" rows="2" placeholder="Manzil" required></textarea>

                    <button type="submit" class="confirm-btn">BUYURTMANI TASDIQLASH</button>
                </form>
            </div>
        </div>
    </div>
</div>

<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"></script>

<script>
// 1. Narxni formatlash
function formatSum(n) {
    if (!n) return "0";
    return Math.round(n).toString().replace(/\B(?=(\d{3})+(?!\d))/g, " ");
}

// 2. Savatga qo'shish
function addToCart(id, name, price) {
    let cart = JSON.parse(localStorage.getItem('cart')) || [];
    let cleanPrice = String(price).replace(/[^0-9]/g, '');

    let found = cart.find(item => item.id === id);
    if (found) {
        found.qty = (parseInt(found.qty) || 1) + 1;
    } else {
        cart.push({ id: id, name: name, price: parseFloat(cleanPrice), qty: 1 });
    }
    
    localStorage.setItem('cart', JSON.stringify(cart));
    updateCartUI();
    alert(name + " savatga qo'shildi!");
}

// 3. UI va Yashirin inputlarni yangilash (Eng muhim joyi!)
function updateCartUI() {
    let cart = JSON.parse(localStorage.getItem('cart')) || [];
    const list = document.getElementById('cart-items-list');
    const totalEl = document.getElementById('cart-total-price');
    const hiddenItems = document.getElementById('hidden-items');
    const hiddenTotal = document.getElementById('hidden-total');

    let total = 0;
    if (!list || !totalEl) return;

    if (cart.length === 0) {
        list.innerHTML = "<p class='text-center text-muted py-3'>Savat hozircha bo'sh</p>";
        totalEl.innerText = "0 so'm";
        if(hiddenItems) hiddenItems.value = "";
        if(hiddenTotal) hiddenTotal.value = 0;
        return;
    }

    list.innerHTML = "";
    cart.forEach((item, index) => {
        let itemTotal = item.price * item.qty;
        total += itemTotal;

        list.innerHTML += `
            <div class="d-flex justify-content-between align-items-center mb-2 border-bottom pb-2">
                <div>
                    <div class="fw-bold" style="font-size: 14px;">${item.name}</div>
                    <small class="text-muted">${item.qty} dona x ${formatSum(item.price)} so'm</small>
                </div>
                <div class="text-end">
                    <div class="fw-bold text-primary">${formatSum(itemTotal)} so'm</div>
                    <button onclick="removeItem(${index})" class="btn btn-sm text-danger p-0 border-0" style="font-size: 12px;">O'chirish</button>
                </div>
            </div>`;
    });

    totalEl.innerText = formatSum(total) + " so'm";
    
    // Django'ga ketadigan ma'lumotlarni to'ldirish
    if(hiddenItems) hiddenItems.value = JSON.stringify(cart);
    if(hiddenTotal) hiddenTotal.value = total;
}

function removeItem(index) {
    let cart = JSON.parse(localStorage.getItem('cart')) || [];
    cart.splice(index, 1);
    localStorage.setItem('cart', JSON.stringify(cart));
    updateCartUI();
}

function togglePayment() {
    const isCard = document.getElementById('pay_card').checked;
    document.getElementById('card_details').style.display = isCard ? 'block' : 'none';
}

function copyCard() {
    const cardNum = document.getElementById('card_num').innerText.replace(/\s/g, '');
    navigator.clipboard.writeText(cardNum);
    alert("Karta raqami nusxalandi!");
}

// Sahifa yuklanganda
document.addEventListener('DOMContentLoaded', updateCartUI);

// Buyurtma berilganda savatni tozalash
document.getElementById('order-form').addEventListener('submit', function() {
    setTimeout(() => {
        localStorage.removeItem('cart');
        updateCartUI();
    }, 500);
});
</script>

</body>
</html>
